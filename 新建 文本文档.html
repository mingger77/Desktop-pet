<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 30px 30px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #e0e0e0;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .score-area span {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 18px;
            border-radius: 30px;
            color: #f0e68c;
            text-shadow: 0 0 8px rgba(240, 230, 140, 0.3);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: #1a1a2e;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #f0e6d0;
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }
        .controls button:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #f0e68c;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(240, 230, 140, 0.15);
        }
        .controls button:active {
            transform: scale(0.96);
        }
        .tip {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-top: 14px;
            letter-spacing: 0.8px;
        }
        .tip kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-area">
            <span>🐍 分数</span>
            <span id="scoreDisplay">0</span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="restartBtn">🔄 重新开始</button>
            <button id="pauseBtn">⏸️ 暂停</button>
        </div>
        <div class="tip">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向
        </div>
    </div>
    <script>
        (function() {
            // ----- 游戏配置 -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const restartBtn = document.getElementById('restartBtn');
            const pauseBtn = document.getElementById('pauseBtn');

            const GRID_SIZE = 20;          // 格子大小 px
            const COLS = canvas.width / GRID_SIZE;   // 20
            const ROWS = canvas.height / GRID_SIZE;  // 20

            // 游戏状态
            let snake = [];                // 坐标数组 [x,y]
            let direction = 'RIGHT';       // 当前方向
            let nextDirection = 'RIGHT';   // 缓冲方向
            let food = { x: 8, y: 10 };
            let score = 0;
            let gameOver = false;
            let isPaused = false;
            let gameLoop = null;           // setInterval 句柄
            const MOVE_INTERVAL = 150;     // 毫秒

            // ----- 初始化 -----
            function initGame() {
                // 停止之前的循环
                if (gameLoop) {
                    clearInterval(gameLoop);
                    gameLoop = null;
                }

                // 蛇的初始位置：4节，从中间向左
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                score = 0;
                gameOver = false;
                isPaused = false;
                pauseBtn.textContent = '⏸️ 暂停';

                // 生成第一个食物（确保不在蛇身上）
                generateFood();

                // 更新显示
                scoreDisplay.textContent = '0';

                // 绘制初始画面
                draw();

                // 启动循环
                gameLoop = setInterval(update, MOVE_INTERVAL);
            }

            // ----- 生成食物（避开蛇身）-----
            function generateFood() {
                const allCells = [];
                // 生成所有可能坐标
                for (let x = 0; x < COLS; x++) {
                    for (let y = 0; y < ROWS; y++) {
                        allCells.push({ x, y });
                    }
                }
                // 移除蛇身占用的格子
                const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
                const available = allCells.filter(cell => !snakeSet.has(`${cell.x},${cell.y}`));

                if (available.length === 0) {
                    // 所有格子被填满 → 胜利（此处简单处理为游戏结束）
                    gameOver = true;
                    return;
                }
                const randIndex = Math.floor(Math.random() * available.length);
                food = available[randIndex];
            }

            // ----- 更新游戏逻辑（每次移动）-----
            function update() {
                // 如果游戏结束或暂停，不移动
                if (gameOver || isPaused) return;

                // 采用缓冲方向，并确保不能反向
                if (nextDirection === 'UP' && direction !== 'DOWN') direction = nextDirection;
                else if (nextDirection === 'DOWN' && direction !== 'UP') direction = nextDirection;
                else if (nextDirection === 'LEFT' && direction !== 'RIGHT') direction = nextDirection;
                else if (nextDirection === 'RIGHT' && direction !== 'LEFT') direction = nextDirection;

                // 计算新头部坐标
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'UP':    newHead.y -= 1; break;
                    case 'DOWN':  newHead.y += 1; break;
                    case 'LEFT':  newHead.x -= 1; break;
                    case 'RIGHT': newHead.x += 1; break;
                    default: break;
                }

                // 检测是否吃到食物
                const ateFood = (newHead.x === food.x && newHead.y === food.y);

                // 构建新蛇
                let newSnake = [newHead, ...snake];
                if (!ateFood) {
                    newSnake.pop(); // 没吃到就移除尾部
                }

                // 碰撞检测：撞墙 或 撞自身
                const headCollision =
                    newHead.x < 0 || newHead.x >= COLS ||
                    newHead.y < 0 || newHead.y >= ROWS ||
                    newSnake.slice(1).some(cell => cell.x === newHead.x && cell.y === newHead.y);

                if (headCollision) {
                    gameOver = true;
                    draw();
                    return;
                }

                // 更新蛇
                snake = newSnake;

                if (ateFood) {
                    score++;
                    scoreDisplay.textContent = score;
                    generateFood();
                    // 如果食物生成失败（蛇填满格子），视为胜利
                    if (!food) {
                        gameOver = true;
                        draw();
                        return;
                    }
                }

                // 重绘
                draw();
            }

            // ----- 绘图 -----
            function draw() {
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 绘制网格线（半透明）
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x <= COLS; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * GRID_SIZE, 0);
                    ctx.lineTo(x * GRID_SIZE, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * GRID_SIZE);
                    ctx.lineTo(canvas.width, y * GRID_SIZE);
                    ctx.stroke();
                }

                // 绘制蛇
                snake.forEach((cell, index) => {
                    const x = cell.x * GRID_SIZE;
                    const y = cell.y * GRID_SIZE;
                    const padding = 1.5;
                    const radius = 4;

                    // 蛇身渐变
                    const gradient = ctx.createRadialGradient(
                        x + GRID_SIZE / 2, y + GRID_SIZE / 2, 2,
                        x + GRID_SIZE / 2, y + GRID_SIZE / 2, GRID_SIZE / 1.5
                    );
                    if (index === 0) {
                        // 头部亮绿色
                        gradient.addColorStop(0, '#a3e635');
                        gradient.addColorStop(1, '#65a30d');
                    } else {
                        gradient.addColorStop(0, '#4ade80');
                        gradient.addColorStop(1, '#16a34a');
                    }
                    ctx.fillStyle = gradient;

                    // 圆角矩形
                    ctx.beginPath();
                    ctx.roundRect(x + padding, y + padding, GRID_SIZE - padding * 2, GRID_SIZE - padding * 2, radius);
                    ctx.fill();

                    // 眼睛（头部）
                    if (index === 0) {
                        ctx.fillStyle = '#1a1a2e';
                        // 根据方向画眼睛
                        let eyeOffsets = [];
                        if (direction === 'RIGHT') {
                            eyeOffsets = [{ dx: 12, dy: 5 }, { dx: 12, dy: 12 }];
                        } else if (direction === 'LEFT') {
                            eyeOffsets = [{ dx: 5, dy: 5 }, { dx: 5, dy: 12 }];
                        } else if (direction === 'UP') {
                            eyeOffsets = [{ dx: 5, dy: 5 }, { dx: 12, dy: 5 }];
                        } else if (direction === 'DOWN') {
                            eyeOffsets = [{ dx: 5, dy: 12 }, { dx: 12, dy: 12 }];
                        }
                        eyeOffsets.forEach(({ dx, dy }) => {
                            ctx.beginPath();
                            ctx.arc(x + dx, y + dy, 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    }
                });

                // 绘制食物（苹果风格）
                if (food) {
                    const fx = food.x * GRID_SIZE;
                    const fy = food.y * GRID_SIZE;
                    const centerX = fx + GRID_SIZE / 2;
                    const centerY = fy + GRID_SIZE / 2;

                    // 发光效果
                    const glow = ctx.createRadialGradient(centerX - 2, centerY - 2, 2, centerX, centerY, GRID_SIZE / 1.6);
                    glow.addColorStop(0, '#ff6b6b');
                    glow.addColorStop(0.6, '#e63946');
                    glow.addColorStop(1, '#b71c1c');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
                    ctx.fill();

                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(centerX - 3, centerY - 3, 4, 0, Math.PI * 2);
                    ctx.fill();

                    // 叶子
                    ctx.fillStyle = '#4ade80';
                    ctx.beginPath();
                    ctx.ellipse(centerX + 6, centerY - 9, 4, 2.5, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 游戏结束或胜利提示
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#f0e68c';
                    ctx.font = 'bold 28px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let message = '💀 游戏结束';
                    if (snake.length === COLS * ROWS) {
                        message = '🎉 你赢了！';
                    }
                    ctx.fillText(message, canvas.width / 2, canvas.height / 2 - 12);
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#ccc';
                    ctx.fillText('点击 "重新开始" 再来一局', canvas.width / 2, canvas.height / 2 + 30);
                }
            }

            // ----- 工具：Canvas roundRect -----
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            // ----- 键盘控制 -----
            function handleKeydown(e) {
                if (gameOver) return;
                const key = e.key;
                // 阻止箭头键滚动页面
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                    e.preventDefault();
                }

                // 设置缓冲方向（不允许反向）
                const opposite = {
                    'ArrowUp': 'DOWN',
                    'ArrowDown': 'UP',
                    'ArrowLeft': 'RIGHT',
                    'ArrowRight': 'LEFT'
                };
                const same = {
                    'ArrowUp': 'UP',
                    'ArrowDown': 'DOWN',
                    'ArrowLeft': 'LEFT',
                    'ArrowRight': 'RIGHT'
                };
                let newDir = null;
                if (key === 'ArrowUp') newDir = 'UP';
                else if (key === 'ArrowDown') newDir = 'DOWN';
                else if (key === 'ArrowLeft') newDir = 'LEFT';
                else if (key === 'ArrowRight') newDir = 'RIGHT';

                if (newDir && newDir !== opposite[key] && newDir !== direction) {
                    nextDirection = newDir;
                }
            }

            // ----- 事件绑定 -----
            window.addEventListener('keydown', handleKeydown);

            // 重新开始按钮
            restartBtn.addEventListener('click', function() {
                initGame();
            });

            // 暂停/继续按钮
            pauseBtn.addEventListener('click', function() {
                if (gameOver) return;
                isPaused = !isPaused;
                pauseBtn.textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
                draw(); // 刷新画面（暂停时也显示暂停状态？可额外覆盖，但简单处理）
                if (isPaused) {
                    // 绘制暂停遮罩
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#f0e68c';
                    ctx.font = 'bold 28px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸️ 暂停中', canvas.width / 2, canvas.height / 2);
                }
            });

            // 页面载入后开始游戏
            initGame();
        })();
    </script>
</body>
</html>
